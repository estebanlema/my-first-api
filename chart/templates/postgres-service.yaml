apiVersion: v1
kind: Service
metadata:
  name: {{ include "my-first-api.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "my-first-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{ include "my-first-api.postgresql.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
