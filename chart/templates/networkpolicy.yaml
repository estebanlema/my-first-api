{{- if .Values.networkPolicy.enabled -}}
---
# Allow inbound traffic to the API and restrict its outbound to postgres + DNS only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "my-first-api.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my-first-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "my-first-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8000
          protocol: TCP
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow outbound to PostgreSQL only
    - to:
        - podSelector:
            matchLabels:
              {{- include "my-first-api.postgresql.selectorLabels" . | nindent 14 }}
      ports:
        - port: 5432
          protocol: TCP
---
# Restrict PostgreSQL to only accept connections from the API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "my-first-api.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my-first-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "my-first-api.postgresql.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "my-first-api.selectorLabels" . | nindent 14 }}
      ports:
        - port: 5432
          protocol: TCP
{{- end }}
