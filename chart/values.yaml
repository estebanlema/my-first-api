replicaCount: 2

image:
  repository: my-first-api
  tag: "latest"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  # annotations:
  #   kubernetes.io/ingress.class: nginx
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  annotations: {}
  host: my-first-api.example.com
  tls: []
  # - secretName: my-first-api-tls
  #   hosts:
  #     - my-first-api.example.com

resources:
  api:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  postgresql:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

postgresql:
  auth:
    username: postgres
    # IMPORTANT: Change this before deploying to production
    # Use: --set postgresql.auth.password=<secure-password>
    password: "changeme"
    database: mydb
  storage:
    size: 1Gi
    storageClassName: ""

networkPolicy:
  enabled: true
